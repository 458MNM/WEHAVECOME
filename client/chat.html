<!DOCTYPE html>
<!-- Renamed chat page -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cryptic Underground Chat</title>
  <script src="https://unpkg.com/libsodium-wrappers/dist/libsodium-wrappers.js"></script>
  <style>
    body {
      font-family: 'Share Tech Mono', monospace;
      background: #181818;
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-image: url('https://www.transparenttextures.com/patterns/diamond-upholstery.png');
    }
    h2 {
      text-align: center;
      font-size: 2em;
      letter-spacing: 2px;
      color: #ff2e63;
      margin-top: 30px;
      text-shadow: 0 0 10px #ff2e63, 0 0 20px #222;
    }
    #chat {
      height: 350px;
      overflow-y: scroll;
      border: 2px solid #ff2e63;
      background: rgba(20,20,20,0.95);
      margin: 30px auto 10px auto;
      width: 90%;
      max-width: 600px;
      border-radius: 8px;
      box-shadow: 0 0 20px #222;
      padding: 10px;
    }
    #message {
      width: 70%;
      background: #222;
      color: #ff2e63;
      border: 1px solid #ff2e63;
      border-radius: 4px;
      padding: 8px;
      font-size: 1em;
      margin-right: 10px;
    }
    button {
      background: #ff2e63;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 1em;
      cursor: pointer;
      box-shadow: 0 0 10px #ff2e63;
      transition: background 0.2s;
    }
    button:hover {
      background: #252a34;
      color: #ff2e63;
    }
    ::selection {
      background: #ff2e63;
      color: #fff;
    }
  </style>
</head>
<body>
  <h2>CRYPTIC UNDERGROUND CHAT</h2>
  <div id="chat"></div>
  <div style="text-align:center; margin-bottom:20px;">
    <input type="text" id="message" placeholder="Enter encrypted message...">
    <button onclick="sendMessage()">Send</button>
  </div>
  <script src="main.js"></script>
</body>
</html>
